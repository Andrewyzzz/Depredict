services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - FLASK_DEBUG=0
    volumes:
      # Backend has inconsistent path resolution:
      # some files resolve to /data, others to /app/data
      - ./data:/data
      - ./data:/app/data
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
